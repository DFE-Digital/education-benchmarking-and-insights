displayName: Average_API_Charts - Vertical Bar
testPlan: url-test.json
description: Average load test for POST /verticalBarChart
engineInstances: 1
testId: 319ab0a4-7b89-4300-a623-cc51fa5f802f
testType: URL
subnetId: /subscriptions/f155d7d4-a235-4563-b077-c19686c7c92a/resourceGroups/s198d13-ebis-core/providers/Microsoft.Network/virtualNetworks/s198d13-app-service-network/subnets/s198d13-load-test-subnet
publicIPDisabled: true
splitAllCSVs: False
configurationFiles:
- requests.csv
failureCriteria:
  clientMetrics:
  - p50(response_time_ms) > 100
  - p95(response_time_ms) > 200
  - p99(response_time_ms) > 500
  - percentage(error) > 0.1
secrets:
- name: chart-rendering-host-key
  value: https://s198d13-ebis-keyvault.vault.azure.net/secrets/chart-rendering-host-key
referenceIdentities:
- kind: KeyVault
  type: SystemAssigned
- kind: Metrics
  type: SystemAssigned
autoStop:
  errorPercentage: 90
  timeWindow: 60
appComponents:
- resourceId: /subscriptions/f155d7d4-a235-4563-b077-c19686c7c92a/resourceGroups/s198d13-ebis-platform/providers/Microsoft.Web/sites/s198d13-ebis-chart-rendering-fa
  resourceName: s198d13-ebis-chart-rendering-fa
  kind: functionapp,linux
  metrics:
  - name: Http5xx
    aggregation: Total
    namespace: microsoft.web/sites
  - name: Requests
    aggregation: Total
    namespace: microsoft.web/sites
  - name: HttpResponseTime
    aggregation: Average
    namespace: microsoft.web/sites
- resourceId: /subscriptions/f155d7d4-a235-4563-b077-c19686c7c92a/resourceGroups/s198d13-ebis-core/providers/Microsoft.Sql/servers/s198d13-sql/databases/data
  resourceName: data
  kind: v12.0,user
  metrics:
  - name: cpu_percent
    aggregation: Total
    namespace: microsoft.sql/servers/databases
  - name: connection_failed
    aggregation: Maximum
    namespace: microsoft.sql/servers/databases
  - name: deadlock
    aggregation: Total
    namespace: microsoft.sql/servers/databases
