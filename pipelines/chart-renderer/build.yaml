pool:
  vmImage: 'ubuntu-latest'

trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    include:
      - chart-renderer
      - pipelines/chart-renderer
      - pipelines/common

pr:
  paths:
    include:
      - chart-renderer

variables:
  - template: ..\common\vars.yaml

name: $(Version)$(Version.Revision.Separator)$(Version.Revision).$(Rev:r)

stages:
  - stage: Build
    displayName: 'Build artifacts'
    jobs:
      - job: SetBuildNumber
        displayName: 'Set build number'
        steps:
          - checkout: none
          - bash: |
              echo "##vso[task.setvariable variable=Version.BuildNumber]$(Version.BuildNumber)"
              echo "##vso[task.setvariable variable=Version.BuildVersion]$(Version.BuildNumber)"
              echo "##vso[build.updatebuildnumber]$(Version.BuildNumber)"
              echo "##vso[build.addbuildtag]$(Version.BuildNumber)"
            displayName: 'Set release build number'
            condition: and(succeeded(), eq(variables['ShouldDeploy'],'true'))

          - bash: |
              if [[ "$(Build.Reason)" == "PullRequest" ]]; then
                echo "##vso[build.addbuildtag]PR$(System.PullRequest.PullRequestId)"
              fi
              echo "##vso[build.addbuildtag]ChartRenderer"
            displayName: 'Set build tags'

      - job: RunLint
        displayName: 'Format TypeScript'
        steps:
          - template: ..\common\npm-lint.yaml
            parameters:
              ProjectDirectory: 'chart-renderer'

      - job: RunTests
        displayName: 'Run unit tests'
        steps:
          - task: Npm@1
            displayName: 'Restore npm packages'
            inputs:
              command: 'install'
              workingDir: 'chart-renderer'
          - task: Npm@1
            displayName: 'Run unit tests'
            inputs:
              command: 'custom'
              customCommand: 'run test:ci'
              workingDir: 'chart-renderer'
          - task: PublishTestResults@2
            displayName: 'Publish test results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'chart-renderer/tests/out/test-output.xml'
              mergeTestResults: true
              testRunTitle: 'ChartRenderer Unit Tests'
            condition: always()

      - job: BuildChartRenderer
        dependsOn: [ SetBuildNumber ]
        displayName: 'Build ChartRenderer'
        steps:
          - task: Npm@1
            displayName: 'Update ChartRenderer version number'
            condition: and(succeeded(), eq(variables['ShouldDeploy'],'true'))
            inputs:
              command: 'custom'
              customCommand: 'version $(Version.BuildVersion)'
              workingDir: 'chart-renderer'
              verbose: false

          - task: Npm@1
            displayName: 'Restore npm packages'
            inputs:
              command: 'install'
              workingDir: 'chart-renderer'

          - task: Npm@1
            displayName: 'Build ChartRenderer api'
            inputs:
              command: 'custom'
              customCommand: 'run build:ci'
              workingDir: 'chart-renderer'

          - task: ArchiveFiles@2
            displayName: 'Publish ChartRenderer api'
            inputs:
              rootFolderOrFile: 'chart-renderer/out'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/chart-renderer-apis/ChartRenderer.Api.zip'

          - publish: $(Build.ArtifactStagingDirectory)/chart-renderer-apis
            displayName: 'Publish chart renderer artifacts'
            artifact: chart-renderer-apis

  - stage: DeployDevelopment
    dependsOn: [ Build ]
    displayName: 'Development'
    condition: and(succeeded(), eq(variables['ShouldDeploy'],'true'))
    jobs:
      - template: deployment.yaml
        parameters:
          subscription: 's198d.azdo-deployment'
          environmentPrefix: 's198d01'
          environment: 'development'
          cipEnvironment: 'Dev'

  - stage: DeployAutomatedTest
    dependsOn: [ Build ]
    displayName: 'Automated test'
    condition: and(succeeded(), eq(variables['ShouldDeploy'],'true'))
    jobs:
      - template: deployment.yaml
        parameters:
          subscription: 's198d.azdo-deployment'
          environmentPrefix: 's198d02'
          environment: 'automated-test'
          cipEnvironment: 'Dev'

  - stage: DeployTest
    dependsOn: [ DeployAutomatedTest ]
    displayName: 'Test'
    condition: and(succeeded(), eq(variables['ShouldDeploy'],'true'))
    jobs:
      - template: deployment.yaml
        parameters:
          subscription: 's198t.azdo-deployment'
          environmentPrefix: 's198t01'
          environment: 'test'
          cipEnvironment: 'Test'
