version: 2
registries:
  npm-azure-artifacts:
    type: npm-registry
    url: https://dfe-ssp.pkgs.visualstudio.com/s198-DfE-Benchmarking-service/_packaging/education-benchmarking/npm/registry/
    username: ${{ secrets.AZURE_DEVOPS_USER }}
    password: ${{ secrets.AZURE_DEVOPS_PAT }}

updates:
  - package-ecosystem: "terraform"
    directory: "/core-infrastructure/terraform"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "hashicorp/*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "core-infrastructure"
      - "terraform"

  - package-ecosystem: "nuget"
    directory: "core-infrastructure"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "Microsoft.*"
          - "System.*"
          - "Azure.*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "core-infrastructure"
      - "dotnet"
      - "nuget"

  - package-ecosystem: "npm"
    directory: "/front-end-components"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    open-pull-requests-limit: 10
    # React v18 to v19 major version upgrade affects other packages as at
    # Feb 2025 due to broken peer dependencies. Ignore for the time being.
    # Feb 2025 html-to-image versions after 1.11.11 cause issues for
    # the styling of front-end-components charts in images.
    # Ignore until resolved.
    # Jun 2026 vite and @vitejs/plugin-react see AB#312826
    ignore:
      - dependency-name: "react"
        versions: [">=19.0.0"]
      - dependency-name: "react-dom"
        versions: [">=19.0.0"]
      - dependency-name: "@types/react"
        versions: [">=19.0.0"]
      - dependency-name: "@types/react-dom"
        versions: [">=19.0.0"]
      - dependency-name: "html-to-image"
      - dependency-name: "recharts"
        versions: [">=3.0.0"]
      - dependency-name: "govuk-frontend"
        versions: [">=6.0.0"]
      - dependency-name: "@vitejs/plugin-react"
        versions: [">=6.0.0"]
      - dependency-name: "vite"
        versions: [">=8.0.0"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "@*/*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "front-end-components"
      - "javascript"
      - "npm"

  - package-ecosystem: "terraform"
    directory: "/platform/terraform"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "hashicorp/*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "platform"
      - "terraform"

  - package-ecosystem: "nuget"
    directory: "/platform"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    # Mar 2026 Microsoft.Azure.StackExchangeRedis issues with our test setup following version 3.3.1, ignored pending work on AB#305821
    # Mar 2026 Microsoft.ApplicationInsights.WorkerService breaking changes 3.x ignored pending work on AB#305698
    ignore:
      - dependency-name: "Microsoft.Azure.StackExchangeRedis"
        versions: [">=3.3.1"]
      - dependency-name: "Microsoft.ApplicationInsights.WorkerService"
        versions: [">=3.0.0"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "Microsoft.*"
          - "System.*"
          - "Azure.*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "platform"
      - "dotnet"
      - "nuget"

  - package-ecosystem: "npm"
    directory: "/platform/src/apis/Platform.Api.ChartRendering"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    # Jun 2026 @types/jsdom see AB#316927
    ignore:
      - dependency-name: "@types/jsdom"
        versions: [">=28.0.1"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "@*/*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "platform"
      - "javascript"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/web/src/Web.App"
    registries:
      - npm-azure-artifacts
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    # Mar 2026 govuk-frontend see AB#305693
    ignore:
      - dependency-name: "govuk-frontend"
        versions: [">=6.0.0"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "@*/*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "web"
      - "javascript"
      - "npm"

  - package-ecosystem: "terraform"
    directory: "/web/terraform"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "hashicorp/*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "web"
      - "terraform"

  - package-ecosystem: "nuget"
    directory: "/web"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    # Jun 2026 Microsoft.ApplicationInsights.AspNetCore see AB#316989
    ignore:
      - dependency-name: "Microsoft.ApplicationInsights.AspNetCore"
        versions: [">=3.0.0"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "Microsoft.*"
          - "System.*"
          - "Azure.*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "web"
      - "dotnet"
      - "nuget"

  - package-ecosystem: "npm"
    directory: "/web/src/Web.Shutter"
    registries:
      - npm-azure-artifacts
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    rebase-strategy: auto
    commit-message:
      prefix: "chore: "
    ignore:
      # Feb 2026 - See AB#295988
      - dependency-name: "gts"
        versions: [">=7.0.0"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        update-types:
          - "patch"
      vendor-minor-updates:
        patterns:
          - "@*/*"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "web"
      - "javascript"
      - "npm"
